<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-dark: #303D30;
            --accent-warm: #A09487;
            --accent-light: #C4B7AD;
            --bg-cream: #EFEAE6;
            --muted-green: #6E6C5A;
            --white: #FFFFFF;
            --text-dark: #2C2C2C;
            --border-light: #D8D0CC;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--white);
            color: var(--text-dark);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Helvetica', 'Arial', sans-serif;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Login Screen */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--muted-green) 100%);
        }

        .login-box {
            background-color: var(--white);
            padding: 48px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .sw-logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--primary-dark);
            margin-bottom: 12px;
            font-family: 'Helvetica', sans-serif;
        }

        .login-title {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--primary-dark);
            font-weight: 600;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--accent-warm);
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-dark);
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 6px;
            border: 1px solid var(--border-light);
            font-size: 14px;
            font-family: 'Open Sans', sans-serif;
            background: var(--white);
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-warm);
            box-shadow: 0 0 0 3px rgba(160, 148, 135, 0.1);
        }

        .form-group button {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--primary-dark);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Open Sans', sans-serif;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }

        .form-group button:hover {
            background-color: var(--muted-green);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(48, 61, 48, 0.2);
        }

        /* Chat Interface */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--white);
        }

        .header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
        }

        .header h1 {
            font-size: 18px;
            letter-spacing: 0.5px;
            color: var(--primary-dark);
        }

        .header-buttons { display: flex; gap: 10px; }

        .header button {
            padding: 8px 16px;
            background-color: var(--bg-cream);
            color: var(--primary-dark);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .header button:hover {
            background-color: var(--accent-light);
            border-color: var(--accent-warm);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--white);
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--primary-dark);
            color: var(--white);
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }

        .assistant-message {
            align-self: flex-start;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            padding: 16px;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
            border-left: 3px solid var(--accent-warm);
            font-size: 14px;
            line-height: 1.6;
        }

        .assistant-message strong {
            color: var(--primary-dark);
            font-weight: 600;
        }

        .citations {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }

        .citation-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-warm);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .citation-item {
            font-size: 12px;
            color: var(--text-dark);
            margin: 6px 0;
            padding: 6px 8px;
            background: var(--white);
            border-radius: 4px;
            border-left: 2px solid var(--muted-green);
            padding-left: 10px;
        }

        .citation-file {
            font-weight: 600;
            color: var(--primary-dark);
        }

        .citation-meta {
            font-size: 11px;
            color: var(--accent-warm);
            margin-top: 2px;
        }

        .system-message {
            align-self: center;
            background-color: #FEF3E2;
            color: #8B6F47;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            max-width: 80%;
            border-left: 3px solid #D4A574;
        }

        .input-form {
            display: flex;
            gap: 10px;
            padding: 20px 24px;
            border-top: 1px solid var(--border-light);
            background: var(--white);
        }

        .input-form input {
            flex: 1;
            padding: 12px 14px;
            border-radius: 6px;
            border: 1px solid var(--border-light);
            font-size: 14px;
            font-family: 'Open Sans', sans-serif;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        .input-form input:focus {
            outline: none;
            border-color: var(--accent-warm);
            box-shadow: 0 0 0 3px rgba(160, 148, 135, 0.1);
        }

        .input-form button {
            padding: 10px 20px;
            background-color: var(--primary-dark);
            color: var(--white);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .input-form button:hover {
            background-color: var(--muted-green);
            transform: translateY(-1px);
        }

        .input-form button:active {
            transform: translateY(0);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-cream);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-warm);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--muted-green);
        }
    </style>
</head>
<body>

<div id="login-screen" class="login-container">
    <div class="login-box">
        <div class="login-header">
            <div class="sw-logo">SW</div>
            <h1 class="login-title">SWAI</h1>
            <p class="login-subtitle">Document Intelligence Platform</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label for="api-url">API URL</label>
                <input
                    type="text"
                    id="api-url"
                    placeholder="https://Benpcolella.pythonanywhere.com"
                    required
                >
            </div>
            <div class="form-group">
                <label for="api-key">API Key</label>
                <input
                    type="password"
                    id="api-key"
                    placeholder="Enter your API key"
                    required
                >
            </div>
            <div class="form-group">
                <button type="submit">Connect</button>
            </div>
        </form>
    </div>
</div>

<div id="chat-screen" class="container" style="display:none;">
    <div class="header">
        <h1>SWAI</h1>
        <div class="header-buttons">
            <button onclick="clearHistory()">Clear</button>
            <button onclick="logout()">Disconnect</button>
        </div>
    </div>
    <div class="messages-container" id="messages"></div>
    <div class="input-form">
        <input
            type="text"
            id="message-input"
            placeholder="Ask a question about your documents..."
            onkeypress="if(event.key === 'Enter') sendMessage()"
        >
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
let apiUrl = '';
let apiKey = '';
const messageHistory = [];

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    apiUrl = document.getElementById('api-url').value;
    apiKey = document.getElementById('api-key').value;

    try {
        const response = await fetch(`${apiUrl}/health`);
        if (response.ok) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            addSystemMessage('Connected to SWAI. How can I help?');
        } else {
            alert('Failed to connect. Please check your API URL.');
        }
    } catch (error) {
        alert('Connection failed: ' + error.message);
    }
});

function addSystemMessage(text) {
    const messagesDiv = document.getElementById('messages');
    const msgEl = document.createElement('div');
    msgEl.className = 'system-message';
    msgEl.textContent = text;
    messagesDiv.appendChild(msgEl);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addUserMessage(text) {
    const messagesDiv = document.getElementById('messages');
    const msgEl = document.createElement('div');
    msgEl.className = 'user-message';
    msgEl.textContent = text;
    messagesDiv.appendChild(msgEl);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addAssistantMessage(answer, citations) {
    const messagesDiv = document.getElementById('messages');
    const msgEl = document.createElement('div');
    msgEl.className = 'assistant-message';

    msgEl.innerHTML = `<p>${answer}</p>`;

    if (citations && citations.length > 0) {
        const citationsDiv = document.createElement('div');
        citationsDiv.className = 'citations';
        citationsDiv.innerHTML = '<div class="citation-header">Sources</div>';

        const seen = new Set();
        for (const citation of citations) {
            const key = citation.file_name;
            if (!seen.has(key)) {
                const citItem = document.createElement('div');
                citItem.className = 'citation-item';
                let html = `<div class="citation-file">📄 ${citation.file_name}</div>`;
                if (citation.doc_type) html += `<div class="citation-meta">Type: ${citation.doc_type}</div>`;
                if (citation.client_project) html += `<div class="citation-meta">Project: ${citation.client_project}</div>`;
                if (citation.page_start) {
                    const pages = citation.page_end && citation.page_end !== citation.page_start
                        ? `${citation.page_start}-${citation.page_end}`
                        : citation.page_start;
                    html += `<div class="citation-meta">Pages: ${pages}</div>`;
                }
                citItem.innerHTML = html;
                citationsDiv.appendChild(citItem);
                seen.add(key);
            }
        }
        msgEl.appendChild(citationsDiv);
    }

    messagesDiv.appendChild(msgEl);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById('message-input');
    const question = input.value.trim();
    if (!question) return;

    addUserMessage(question);
    input.value = '';

    try {
        const response = await fetch(`${apiUrl}/api/query`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ question })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        if (data.status === 'success') {
            addAssistantMessage(data.answer, data.citations);
            messageHistory.push({ role: 'user', content: question });
            messageHistory.push({ role: 'assistant', content: data.answer });
        } else {
            addSystemMessage('Error: ' + (data.error || 'Unknown error'));
        }
    } catch (error) {
        addSystemMessage('Connection error: ' + error.message);
    }
}

function clearHistory() {
    document.getElementById('messages').innerHTML = '';
    messageHistory.length = 0;
    addSystemMessage('History cleared.');
}

function logout() {
    document.getElementById('chat-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-form').reset();
    document.getElementById('messages').innerHTML = '';
    messageHistory.length = 0;
    apiUrl = '';
    apiKey = '';
}
</script>

</body>
</html>
